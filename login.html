<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Portal Internal LaporFasum</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(160deg, #0d47a1 0%, #1976d2 55%, #e3f2fd 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 40px rgba(13,71,161,0.25);
            padding: 44px 48px;
            width: 100%;
            max-width: 440px;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .login-logo .icon { font-size: 2.8rem; display: block; margin-bottom: 8px; }
        .login-logo h1 { font-size: 1.6rem; font-weight: 800; color: #0d47a1; margin: 0; }
        .login-logo p { font-size: 0.88rem; color: #78909c; margin-top: 6px; }
        .login-card label { color: #1565c0; font-weight: 600; font-size: 0.9rem; }
        .login-card input {
            border: 1.5px solid #c7d9f5;
            border-radius: 8px;
            padding: 11px 14px;
            font-size: 0.95rem;
            width: 100%;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
            margin-bottom: 18px;
        }
        .login-card input:focus {
            outline: none;
            border-color: #1976d2;
            box-shadow: 0 0 0 3px rgba(25,118,210,0.12);
        }
        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #1565c0, #1976d2);
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 4px 16px rgba(21,101,192,0.35);
        }
        .btn-login:hover { filter: brightness(1.08); transform: translateY(-1px); box-shadow: 0 6px 22px rgba(21,101,192,0.45); }
        .back-to-home { display: block; text-align: center; margin-top: 20px; color: rgba(255,255,255,0.8); font-size: 0.88rem; text-decoration: none; }
        .back-to-home:hover { color: #fff; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-logo">
            <span class="icon"></span>
            <h1>LaporFasum</h1>
            <p>Portal Internal – Masuk sebagai Admin atau Petugas</p>
        </div>

        <form action="proses_login.php" method="POST">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Masukkan username..." required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Masukkan password..." required>

            <button type="submit" class="btn-login">Masuk ke Sistem</button>
        </form>
    </div>

    <a href="index.html" class="back-to-home">← Kembali ke Halaman Utama</a>

</body>
</html>
